[project]
name = "ozobot-evo"
version = "0.1.0"
description = "Ozobot EVO library"
readme = "README.md"
authors = [
    { name = "Ondrej Novak", email = "ondrej.novak@ozobot.com" }
]
requires-python = ">=3.12"
dependencies = [
    "ozobot-ble",
    "bleak>=0.22.3"
]

[tool.hatch.build.targets.sdist]
sources = ["src"]
only-include = ["src/ozobot"]

[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/ozobot"]

[project.scripts]
evo-playground = "ozobot.evo.playground:run"

[tool.uv.sources]
ozobot-ble = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
