name: Build and publish

on:
  push:
  release:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
         
    - name: Build packages
      env:
        SETUPTOOLS_SCM_PRETEND_METADATA: '{node=""}'
      run: uv build --all-packages

    - name: Upload github artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  check-rc-tag:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      is-rc: ${{ steps.check.outputs.is-rc }}
      package-name: ${{ steps.check.outputs.package-name }}
    steps:
    - id: check
      run: |
        if [[ "${{ github.ref_name }}" =~ rc[0-9]+$ ]]; then
          echo "is-rc=true" >> $GITHUB_OUTPUT
          project_name=$(echo "${{ github.ref_name }}" | sed 's:/.*::; s/-/_/g')
          package_name="ozobot_${project_name}"
          echo "package-name=$package_name" >> $GITHUB_OUTPUT
        else
          echo "is-rc=false" >> $GITHUB_OUTPUT
        fi

  publish-to-testpypi:
    needs: [build, check-rc-tag]
    if: needs.check-rc-tag.outputs.is-rc == 'true'
    
    name: "${{ needs.check-rc-tag.outputs.package-name }}: publish to TestPyPI"
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ needs.check-rc-tag.outputs.package-name }}
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: alldist/

    - name: Copy specific package dist to upload directory
      run: |
        mkdir dist/
        cp alldist/${{ needs.check-rc-tag.outputs.package-name }}-* dist/

    - name: Publish distribution package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true
