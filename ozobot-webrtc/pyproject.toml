[project]
name = "ozobot-webrtc"
version = "0.1.0"
description = "Ozobot WebRTC library"
readme = "README.md"
authors = [
    { name = "Ondrej Novak", email = "ondrej.novak@ozobot.com" }
]
requires-python = ">=3.13"
dependencies = [
    "aiortc>=1.13.0",
    "aiormq",
    "pydantic>=2",
    "aiohttp>=3.12.13",
]

[tool.hatch.build.targets.sdist]
sources = ["src"]
only-include = ["src/ozobot"]

[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/ozobot"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
